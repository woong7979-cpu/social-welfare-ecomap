<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>사회복지 가계도·생태도 자동작성</title>
  <meta name="description" content="인터뷰 텍스트를 입력하면 가계도와 생태도를 자동으로 그려주고, 누락된 사정 항목을 안내합니다." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>
      🧭 사회복지 가계도·생태도 자동작성
      <span class="badge">v0.1 · MVP</span>
    </h1>
    <div class="actions">
      <button class="btn" id="btn-sample">샘플 보기</button>
      <button class="btn" id="btn-clear">초기화</button>
    </div>
  </header>

  <main>
    <!-- ───────── 좌측: 입력 + 보강 가이드 ───────── -->
    <aside class="panel input-area">
      <h2>📝 인터뷰 원문 입력</h2>
      <textarea id="interview" placeholder="예) 의뢰인은 42세 여성으로 12세 딸, 9세 아들과 함께 거주 중인 한부모 가정. 5년 전 이혼하여 사무직으로 근무 중이며, 친정 어머니가 자녀 등하원을 도와줌. 동네 보건소에서 정기 검진을 받지만 종교·여가 활동은 거의 없음... (인터뷰 전사본을 자유 형식으로 붙여넣으세요)"></textarea>
      <div class="row">
        <button class="btn primary" id="btn-analyze">🔍 분석하기</button>
      </div>
      <div class="status-msg" id="status"></div>

      <h2 style="margin-top: 16px;">🧩 보강 인터뷰 가이드</h2>
      <ul class="guide-list" id="guide-list">
        <li class="empty-state" style="background:none;border:none;">
          분석을 실행하면 보강이 필요한 항목이 여기에 표시됩니다.
        </li>
      </ul>
    </aside>

    <!-- ───────── 우측: 시각화 ───────── -->
    <section class="viz-stack">
      <article class="viz-card">
        <div class="head">
          <h2>👨‍👩‍👦 가계도 (Genogram)</h2>
          <span class="legend">3세대 · 본인은 파란 굵은 테두리</span>
        </div>
        <div class="svg-wrap">
          <svg id="genogram" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="legend-box">
          <span class="legend-item">
            <svg width="16" height="16"><rect x="2" y="2" width="12" height="12" fill="white" stroke="#333" stroke-width="2"/></svg>
            남자
          </span>
          <span class="legend-item">
            <svg width="16" height="16"><circle cx="8" cy="8" r="6" fill="white" stroke="#333" stroke-width="2"/></svg>
            여자
          </span>
          <span class="legend-item">
            <svg width="16" height="16"><rect x="2" y="2" width="12" height="12" fill="white" stroke="#333" stroke-width="2"/><line x1="2" y1="2" x2="14" y2="14" stroke="#333" stroke-width="1.5"/><line x1="14" y1="2" x2="2" y2="14" stroke="#333" stroke-width="1.5"/></svg>
            사망
          </span>
          <span class="legend-item">
            <svg width="16" height="16"><rect x="2" y="2" width="12" height="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="3"/></svg>
            본인(클라이언트)
          </span>
        </div>
      </article>

      <article class="viz-card">
        <div class="head">
          <h2>🌐 생태도 (Ecomap)</h2>
          <span class="legend">중앙 = 가구 · 외부 체계는 방사형</span>
        </div>
        <div class="svg-wrap">
          <svg id="ecomap" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="legend-box">
          <span class="legend-item">
            <svg width="40" height="10"><line x1="0" y1="5" x2="40" y2="5" stroke="#444" stroke-width="2"/></svg>
            긍정 관계
          </span>
          <span class="legend-item">
            <svg width="40" height="10"><line x1="0" y1="5" x2="40" y2="5" stroke="#444" stroke-width="2" stroke-dasharray="6 4"/></svg>
            불확실/미약
          </span>
          <span class="legend-item">
            <svg width="40" height="14">
              <line x1="0" y1="7" x2="40" y2="7" stroke="#444" stroke-width="2"/>
              <line x1="6" y1="2" x2="6" y2="12" stroke="#444" stroke-width="1.5"/>
              <line x1="14" y1="2" x2="14" y2="12" stroke="#444" stroke-width="1.5"/>
              <line x1="22" y1="2" x2="22" y2="12" stroke="#444" stroke-width="1.5"/>
              <line x1="30" y1="2" x2="30" y2="12" stroke="#444" stroke-width="1.5"/>
            </svg>
            긴장 관계
          </span>
          <span class="legend-item">
            <svg width="40" height="10"><line x1="0" y1="5" x2="34" y2="5" stroke="#444" stroke-width="2"/><polygon points="34,1 40,5 34,9" fill="#444"/></svg>
            도움 방향
          </span>
          <span class="legend-item">
            선 굵기 = 강도 (1~3)
          </span>
        </div>
      </article>
    </section>
  </main>

  <footer>
    사회복지실천론 · 가계도/생태도 자동작성 · 2025-2학기 학습용 · 개인정보 비저장
  </footer>

  <script type="module">
    import { renderGenogram } from './src/render-genogram.js';
    import { renderEcomap } from './src/render-ecomap.js';
    import { checkMissing } from './src/missing-checker.js';
    import { SAMPLE_CASE } from './src/sample-case.js';

    const $ = (sel) => document.querySelector(sel);
    const interviewEl = $('#interview');
    const statusEl = $('#status');
    const guideList = $('#guide-list');
    const genogramSvg = $('#genogram');
    const ecomapSvg = $('#ecomap');

    function setStatus(msg, kind = 'info') {
      statusEl.textContent = msg;
      statusEl.className = `status-msg show ${kind}`;
      if (!msg) statusEl.classList.remove('show');
    }
    function clearStatus() { statusEl.classList.remove('show'); }

    function render(data) {
      try {
        renderGenogram(genogramSvg, data);
        renderEcomap(ecomapSvg, data);
        const missing = checkMissing(data);
        renderGuide(missing);
      } catch (err) {
        console.error(err);
        setStatus('렌더링 오류: ' + err.message, 'error');
      }
    }

    function renderGuide(items) {
      guideList.innerHTML = '';
      if (!items.length) {
        guideList.innerHTML = '<li class="empty-state" style="background:none;border:none;">✅ 사정 핵심 항목이 모두 수집되었습니다.</li>';
        return;
      }
      for (const it of items) {
        const li = document.createElement('li');
        li.classList.add('high');
        const sev = document.createElement('span');
        sev.className = 'sev';
        sev.textContent = '필수';
        const txt = document.createElement('span');
        txt.textContent = it.message;
        li.appendChild(sev); li.appendChild(txt);
        guideList.appendChild(li);
      }
    }

    // === 샘플 보기 ===
    $('#btn-sample').addEventListener('click', () => {
      interviewEl.value = SAMPLE_TEXT;
      setStatus('가상 샘플 케이스(한부모 가정 의뢰인 A)를 시각화했습니다.', 'success');
      render(SAMPLE_CASE);
    });

    // === 초기화 ===
    $('#btn-clear').addEventListener('click', () => {
      interviewEl.value = '';
      clearStatus();
      genogramSvg.innerHTML = '';
      ecomapSvg.innerHTML = '';
      guideList.innerHTML = '<li class="empty-state" style="background:none;border:none;">분석을 실행하면 보강이 필요한 항목이 여기에 표시됩니다.</li>';
    });

    // === 분석하기 ===
    $('#btn-analyze').addEventListener('click', async () => {
      const text = interviewEl.value.trim();
      if (!text) {
        setStatus('인터뷰 원문을 입력해주세요.', 'error');
        return;
      }
      setStatus('분석 중... (Claude API 호출)', 'info');
      $('#btn-analyze').disabled = true;
      try {
        const res = await fetch('/api/parse', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`서버 오류 (${res.status}): ${errText}`);
        }
        const data = await res.json();
        render(data);
        setStatus('분석 완료', 'success');
      } catch (err) {
        console.error(err);
        setStatus(
          '분석 실패: ' + err.message +
          '\n\n로컬에서 테스트 중이라면 [샘플 보기]를 눌러보세요.',
          'error'
        );
      } finally {
        $('#btn-analyze').disabled = false;
      }
    });

    // 페이지 로드 시 자동으로 샘플 1회 렌더 (첫인상 데모)
    render(SAMPLE_CASE);

    // 샘플용 인터뷰 원문 (가상 사례 — 실제 인물·기관과 무관, 학습 시연 목적)
    const SAMPLE_TEXT = `의뢰인 A는 42세 여성으로, 12세 딸과 9세 아들과 함께 거주 중인 한부모 가정의 가장입니다.
5년 전 이혼하였고, 전남편(45세, 직장인)은 별도 거주 중이며 양육비는 정기적으로 송금되나 자녀 면접교섭은 불규칙합니다.

가족 구성:
- 아버지(75세, 5년 전 작고): 친조부모는 두 분 모두 작고하셨습니다.
- 어머니(68세, 전업주부): 같은 동네에 거주하며 손주 등하원을 도움. 외조부는 일찍 작고, 외조모(78세)는 농촌 거주.
- 언니(45세, 교사)와 형부(47세, 회사원): 같은 동네 거주, 조카(15세, 중학생) 1명. 정서적·실질적 지원이 가능.
- 본인(42세, 사무직).
- 딸(12세, 초등 6학년).
- 아들(9세, 초등 3학년).

생태계:
- 본인은 사무직에서 야근과 강한 긴장 관계로 큰 스트레스를 받고 있음.
- 친정 어머니의 손주 돌봄 지원이 가장 큰 강점.
- 자녀 둘 다 학교생활은 비교적 만족스러움.
- 동네 보건소에서 정기 건강검진을 받으나 의료 접근성은 낮은 편.
- 한부모 자조모임에 가끔 참여하나 깊은 친구 관계는 형성되지 않음.
- 아동 돌봄센터를 통해 방과 후 돌봄을 받음.
- 종교활동·취미·평생학습 등은 거의 없는 상태.`;
  </script>
</body>
</html>
